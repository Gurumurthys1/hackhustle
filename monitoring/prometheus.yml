global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fraud-engine'
    static_configs:
      - targets: ['fraud-engine:8002']

  - job_name: 'return-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['return-api:8080']

  - job_name: 'graph-service'
    static_configs:
      - targets: ['graph-service:8001']
