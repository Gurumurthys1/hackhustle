# Spring Boot — MongoDB Configuration
# TriNetra AI Return API

spring.application.name=trinetra-return-api
server.port=8085

# ── MongoDB ──────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://gurumurthys252005_db_user:TriNetra@cluster0.x7chbyg.mongodb.net/?appName=Cluster0}
spring.data.mongodb.database=${MONGODB_DB:trinetra_db}
spring.data.mongodb.auto-index-creation=true

# ── Kafka / Redpanda ──────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
kafka.topic.claims=${KAFKA_TOPIC:trinetra.return.claims}

# ── Actuator (Prometheus scraping) ───────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# ── Logging ───────────────────────────────────────────────
logging.level.ai.trinetra=INFO
logging.level.org.springframework.data.mongodb=WARN
